<html lang="en">

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      background: #f7f6f3;
      color: #1a1a1a;
      padding: 2.5rem 1.5rem 4rem;

    .page { max-width: 900px; margin: 0 auto; }

    header { margin-bottom: 2rem; }

    h1 {

      font-weight: 600;
      color: #111;
      margin-bottom: 0.35rem;
    }

    .meta {
      font-size: 0.82rem;
      color: #888;
      line-height: 1.5;
    }

    .meta strong { color: #555; }

    /* Chart card */
    .chart-card {
      background: #fff;
      border: 1px solid #e5e3dc;
      border-radius: 8px;
      padding: 1.5rem 1.5rem 1rem;
      margin-bottom: 1.5rem;
    }

    .chart-wrap {
      position: relative;
      height: 420px;
    }

    /* Legend */
    .active-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      min-height: 1.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: #444;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Category selector */
    .selector-card {
      background: #fff;
      border: 1px solid #e5e3dc;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    .selector-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .selector-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
    }

    .clear-btn {
      font-size: 0.75rem;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .clear-btn:hover { color: #e63946; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .chip {
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #f7f6f3;
      color: #555;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .chip:hover {
      border-color: #aaa;
      color: #111;
    }

    .chip.active {
      color: #fff;
      border-color: transparent;
    }

    .note {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #aaa;
      line-height: 1.5;
    }

    /* Date range */
    .range-card {
      background: #fff;
      border: 1px solid #e5e3dc;
      border-radius: 8px;
      padding: 0.9rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .range-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
      white-space: nowrap;
    }

    .range-select {
      font-size: 0.83rem;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
      background: #f7f6f3;
      cursor: pointer;
      flex-shrink: 0;
    }

    .range-select:focus { outline: none; border-color: #aaa; }

    .range-sep { font-size: 0.8rem; color: #ccc; }

    /* Variable toggle */
    .chart-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 1rem;
    }

    .seg-control {
      display: inline-flex;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
      background: #f7f6f3;
    }

    .seg-btn {
      font-size: 0.78rem;
      padding: 0.3rem 0.85rem;
      border: none;
      background: none;
      color: #888;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .seg-btn:not(:last-child) { border-right: 1px solid #ddd; }

    .seg-btn.active {
      background: #1a1a1a;
      color: #fff;
    }

    .seg-btn:not(.active):hover { background: #eee; color: #333; }
  </style>
</head>

        borderColor: '#e0ddd6',
        borderWidth: 1,
        titleColor: '#111',
        bodyColor: '#444',
        padding: 10,
        callbacks: {
          label: ctx => {
            if (ctx.dataset.label === 'Baseline (100)') return null;
            const v = ctx.parsed.y;
            return ` ${ctx.dataset.label}: ${v !== null ? v.toFixed(1) : '—'}`;
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(0,0,0,0.04)' },
        ticks: {
          color: '#999',
          font: { size: 11 },
          maxTicksLimit: 13,
          maxRotation: 0
        }
      },
      y: {
        grid: { color: 'rgba(0,0,0,0.06)' },
        ticks: {
          color: '#999',
          font: { size: 11 },
          callback: v => v
        },
        title: {
          display: true,
          text: 'Index (Feb 2020 = 100)',
          color: '#bbb',
          font: { size: 11 }
        }
      }
    }
  }
});

// ── ACTIVE CATEGORIES ─────────────────────────────────────────────────────────

const activeSet = new Set();

function updateChart() {
  const s = rangeStart, e = rangeEnd;
  const catDatasets = [...activeSet].map(name => ({
    label: name,
    data: currentCategories()[name].slice(s, e + 1),
    borderColor: colorFor(name),
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 0,
    pointHoverRadius: 4,
    tension: 0.3,
    fill: false
  }));
  chart.data.labels = LABELS.slice(s, e + 1);
  chart.data.datasets = [...buildBaseDatasets(s, e), ...catDatasets];
  chart.update();
  renderLegend();
}

function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';

  // Overall
  const ov = document.createElement('span');
  ov.className = 'legend-item';
  ov.innerHTML = `<span class="legend-dot" style="background:#bbb"></span>All Categories (avg)`;
  el.appendChild(ov);

  activeSet.forEach(name => {
    const item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${colorFor(name)}"></span>${name}`;
    el.appendChild(item);
  });
}

function toggleCategory(name) {
  const chip = document.querySelector(`.chip[data-name="${CSS.escape(name)}"]`);
  if (activeSet.has(name)) {
    activeSet.delete(name);
    if (chip) { chip.classList.remove('active'); chip.style.background = ''; chip.style.borderColor = ''; }
  } else {
    activeSet.add(name);
    const c = colorFor(name);
    if (chip) { chip.classList.add('active'); chip.style.background = c; chip.style.borderColor = c; }
  }
  updateChart();
}

function clearAll() {
  activeSet.clear();
  document.querySelectorAll('.chip.active').forEach(c => {
    c.classList.remove('active');
    c.style.background = '';
    c.style.borderColor = '';
  });
  updateChart();
}

// ── RANGE CONTROLS ───────────────────────────────────────────────────────────

function populateRangeSelects() {
  const from = document.getElementById('rangeFrom');
  const to   = document.getElementById('rangeTo');
  LABELS.forEach((label, i) => {
    from.appendChild(new Option(label, i));
    to.appendChild(new Option(label, i));
  });
  to.value = LABELS.length - 1;
}

function updateRange() {
  let s = parseInt(document.getElementById('rangeFrom').value);
  let e = parseInt(document.getElementById('rangeTo').value);
  if (s > e) { [s, e] = [e, s]; }
  rangeStart = s;
  rangeEnd = e;
  updateChart();
}

function resetRange() {
  rangeStart = 0;
  rangeEnd = LABELS.length - 1;
  document.getElementById('rangeFrom').value = 0;
  document.getElementById('rangeTo').value = LABELS.length - 1;
  updateChart();
}

populateRangeSelects();

// ── BUILD CHIPS ───────────────────────────────────────────────────────────────

const chipsEl = document.getElementById('chips');
Object.keys(CATEGORIES).forEach(name => {
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.dataset.name = name;
  chip.textContent = name;
  chip.onclick = () => toggleCategory(name);
  chipsEl.appendChild(chip);
});

renderLegend();
</script>
</body>
</html>
